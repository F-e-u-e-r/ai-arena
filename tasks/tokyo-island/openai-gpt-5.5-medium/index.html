<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Floating Tokyo Island</title>
  <link rel="icon" href="../../../assets/favicon.svg">
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #8fd3ff; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #app { position: fixed; inset: 0; }
    .hud { position: fixed; left: 18px; top: 16px; color: #17324d; text-shadow: 0 1px 0 rgba(255,255,255,.55); pointer-events: none; }
    .hud h1 { margin: 0 0 4px; font-size: clamp(20px, 3vw, 34px); letter-spacing: 0; }
    .hud p { margin: 0; font-size: 13px; max-width: 320px; line-height: 1.35; }
    .panel { position: fixed; right: 14px; bottom: 14px; display: grid; gap: 6px; color: #17324d; font-size: 12px; background: rgba(255,255,255,.62); border: 1px solid rgba(23,50,77,.16); padding: 10px 12px; border-radius: 8px; backdrop-filter: blur(8px); }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="app"></div>
  <section class="hud">
    <h1>Floating Tokyo Island</h1>
    <p>Drag left or right to orbit. Press F to speed the 15 second day-night cycle.</p>
  </section>
  <section class="panel">
    <span id="phase">phase</span>
    <span id="stats">leaves</span>
  </section>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const root = document.getElementById('app');
    const phaseEl = document.getElementById('phase');
    const statsEl = document.getElementById('stats');
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x9fd8ff, 18, 58);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 120);
    camera.position.set(8, 5.6, 10);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    root.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 7;
    controls.maxDistance = 18;
    controls.maxPolarAngle = Math.PI * .47;
    controls.target.set(0, 1.2, 0);

    const hemi = new THREE.HemisphereLight(0xdff7ff, 0x6f7b4a, 1.8);
    const sunLight = new THREE.DirectionalLight(0xffffff, 2.7);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    const moonLight = new THREE.DirectionalLight(0xaec7ff, .15);
    scene.add(hemi, sunLight, moonLight);

    const toon = (color, opts = {}) => new THREE.MeshToonMaterial({ color, ...opts });
    const standard = (color, opts = {}) => new THREE.MeshStandardMaterial({ color, roughness: .72, metalness: .02, ...opts });

    class Island {
      constructor() {
        this.group = new THREE.Group();
        const grass = new THREE.Mesh(new THREE.CylinderGeometry(4.2, 4.8, .72, 40), toon(0x71c95b));
        grass.position.y = 0;
        grass.castShadow = grass.receiveShadow = true;
        const rock = new THREE.Mesh(new THREE.ConeGeometry(4.45, 3.3, 40), standard(0xb47a4b));
        rock.position.y = -1.95;
        rock.rotation.y = Math.PI / 40;
        rock.castShadow = rock.receiveShadow = true;
        const rim = new THREE.Mesh(new THREE.TorusGeometry(4.12, .08, 8, 80), toon(0x3ca85f));
        rim.position.y = .39;
        this.group.add(grass, rock, rim);
        for (let i = 0; i < 28; i++) {
          const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(.08 + Math.random() * .1), standard(0x8f755f));
          const a = Math.random() * Math.PI * 2, r = 3.1 + Math.random() * .9;
          stone.position.set(Math.cos(a) * r, .42, Math.sin(a) * r);
          stone.castShadow = true;
          this.group.add(stone);
        }
        scene.add(this.group);
      }
      update(t) {
        this.group.position.y = Math.sin(t * 1.2) * .18;
        this.group.rotation.z = Math.sin(t * .55) * .015;
      }
    }

    class TokyoTower {
      constructor(parent) {
        this.group = new THREE.Group();
        this.lit = [];
        const orange = toon(0xf26932), cream = toon(0xfff0d8), glow = standard(0xff7b35, { emissive: 0xff5b1d, emissiveIntensity: 0 });
        const makeLeg = (x, z, ry) => {
          const leg = new THREE.Mesh(new THREE.BoxGeometry(.18, 3.2, .18), orange);
          leg.position.set(x, 1.85, z); leg.rotation.z = x * -.13; leg.rotation.x = z * .13; leg.castShadow = true; this.group.add(leg);
        };
        makeLeg(-.72, -.72); makeLeg(.72, -.72); makeLeg(-.72, .72); makeLeg(.72, .72);
        for (let y of [.72, 1.55, 2.45, 3.25]) {
          const deck = new THREE.Mesh(new THREE.BoxGeometry(1.9 - y * .28, .14, 1.9 - y * .28), y > 2 ? cream : orange);
          deck.position.y = y; deck.castShadow = true; this.group.add(deck);
        }
        const needle = new THREE.Mesh(new THREE.ConeGeometry(.22, 1.5, 8), orange);
        needle.position.y = 4.25; needle.castShadow = true; this.group.add(needle);
        for (let y of [1.1, 2.05, 3.05]) {
          const band = new THREE.Mesh(new THREE.TorusGeometry(.72 - y * .12, .025, 6, 30), glow);
          band.position.y = y; band.rotation.x = Math.PI / 2; this.group.add(band); this.lit.push(band.material);
        }
        const beacon = new THREE.PointLight(0xff9a44, 0, 8);
        beacon.position.set(0, 3.6, 0); this.group.add(beacon); this.beacon = beacon;
        parent.add(this.group);
      }
      setLights(on, k) {
        const intensity = on ? k : 0;
        this.beacon.intensity = intensity * 2.5;
        this.lit.forEach(m => m.emissiveIntensity = intensity * 1.4);
      }
    }

    class Landmark {
      static fuji(parent) {
        const g = new THREE.Group();
        const mountain = new THREE.Mesh(new THREE.ConeGeometry(.95, 1.4, 5), toon(0x6f91b8));
        mountain.position.y = .95; mountain.castShadow = true;
        const snow = new THREE.Mesh(new THREE.ConeGeometry(.38, .42, 5), toon(0xf6fbff));
        snow.position.y = 1.61; snow.castShadow = true;
        g.position.set(-2.6, .38, -1.6); g.add(mountain, snow); parent.add(g); return g;
      }
      static torii(parent) {
        const g = new THREE.Group(), red = toon(0xdc3545), dark = toon(0x372222);
        for (const x of [-.42,.42]) { const p = new THREE.Mesh(new THREE.BoxGeometry(.16,.92,.14), red); p.position.set(x,.84,0); p.castShadow = true; g.add(p); }
        const top = new THREE.Mesh(new THREE.BoxGeometry(1.35,.16,.2), red); top.position.y = 1.35; top.castShadow = true;
        const cap = new THREE.Mesh(new THREE.BoxGeometry(1.65,.12,.24), dark); cap.position.y = 1.52; cap.castShadow = true;
        g.position.set(2.2,.35,-1.5); g.rotation.y = -.5; g.add(top, cap); parent.add(g); return g;
      }
      static temple(parent) {
        const g = new THREE.Group(), wood = toon(0x8b4b36), roofMat = toon(0x2f6650);
        const base = new THREE.Mesh(new THREE.BoxGeometry(1.25,.52,.9), wood); base.position.y = .72; base.castShadow = true;
        const roof = new THREE.Mesh(new THREE.ConeGeometry(.95,.45,4), roofMat); roof.position.y = 1.24; roof.rotation.y = Math.PI / 4; roof.castShadow = true;
        g.position.set(-1.9,.35,1.7); g.rotation.y = .35; g.add(base, roof); parent.add(g); return g;
      }
    }

    class MapleLeafSystem {
      constructor(count = 240) {
        this.leaves = [];
        const shape = new THREE.Shape();
        shape.moveTo(0, .24); shape.lineTo(.08,.07); shape.lineTo(.24,.09); shape.lineTo(.12,-.03); shape.lineTo(.18,-.2); shape.lineTo(0,-.09); shape.lineTo(-.18,-.2); shape.lineTo(-.12,-.03); shape.lineTo(-.24,.09); shape.lineTo(-.08,.07); shape.closePath();
        const geom = new THREE.ShapeGeometry(shape);
        for (let i = 0; i < count; i++) {
          const mat = new THREE.MeshToonMaterial({ color: [0xd94b38,0xff8a2a,0xb42f2b,0xffc247][i % 4], side: THREE.DoubleSide });
          const leaf = new THREE.Mesh(geom, mat);
          leaf.userData.seed = Math.random() * 99;
          this.reset(leaf, true);
          scene.add(leaf); this.leaves.push(leaf);
        }
      }
      reset(leaf, randomY = false) {
        const a = Math.random() * Math.PI * 2, r = 4.2 + Math.random() * 8;
        leaf.position.set(Math.cos(a) * r, randomY ? Math.random() * 9 + 1 : 8 + Math.random() * 3, Math.sin(a) * r);
        leaf.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
        leaf.scale.setScalar(.55 + Math.random() * .45);
        leaf.userData.speed = .45 + Math.random() * .9;
      }
      update(dt, t) {
        for (const leaf of this.leaves) {
          const s = leaf.userData.seed;
          leaf.position.y -= leaf.userData.speed * dt;
          leaf.position.x += Math.sin(t * 1.7 + s) * dt * .45;
          leaf.position.z += Math.cos(t * 1.35 + s) * dt * .28;
          leaf.rotation.x += dt * (1.2 + s % 1);
          leaf.rotation.z += dt * (1.6 + s % 2);
          if (leaf.position.y < -2.7) this.reset(leaf);
        }
      }
    }

    class DayNightCycle {
      constructor(tower, litLandmarks) {
        this.tower = tower;
        this.litLandmarks = litLandmarks;
        this.speed = 1;
        this.sun = new THREE.Mesh(new THREE.SphereGeometry(.45, 24, 16), standard(0xffd45c, { emissive: 0xffb02e, emissiveIntensity: 1 }));
        this.moon = new THREE.Mesh(new THREE.SphereGeometry(.35, 24, 16), standard(0xdbe7ff, { emissive: 0x8eabff, emissiveIntensity: .45 }));
        scene.add(this.sun, this.moon);
      }
      update(t) {
        const p = (t * this.speed % 15) / 15;
        const a = p * Math.PI * 2;
        const day = Math.max(0, Math.sin(a));
        const night = Math.max(0, -Math.sin(a));
        const dusk = Math.max(0, 1 - Math.abs(p - .33) / .12);
        const dawn = Math.max(0, 1 - Math.abs(p - .86) / .12);
        const lightK = THREE.MathUtils.clamp(night + dusk * .75, 0, 1);
        sunLight.position.set(Math.cos(a) * 12, Math.sin(a) * 12, 4);
        moonLight.position.set(Math.cos(a + Math.PI) * 10, Math.sin(a + Math.PI) * 10, -5);
        this.sun.position.copy(sunLight.position).multiplyScalar(.72);
        this.moon.position.copy(moonLight.position).multiplyScalar(.75);
        sunLight.intensity = .45 + day * 2.4 + dusk * .8 + dawn * .7;
        moonLight.intensity = .15 + night * 1.1;
        hemi.intensity = .55 + day * 1.25 + dawn * .35;
        const sky = new THREE.Color(0x8fd3ff).lerp(new THREE.Color(0xffa35d), Math.max(dusk, dawn) * .7).lerp(new THREE.Color(0x101936), night * .82);
        const fog = new THREE.Color(0xbfdff0).lerp(new THREE.Color(0x241b42), night * .75).lerp(new THREE.Color(0xffbf7a), Math.max(dusk, dawn) * .3);
        renderer.setClearColor(sky);
        scene.fog.color.copy(fog);
        this.tower.setLights(lightK > .12, lightK);
        this.litLandmarks.forEach(o => o.traverse(m => { if (m.material?.emissive) m.material.emissiveIntensity = lightK * .25; }));
        phaseEl.textContent = `cycle ${Math.round(p * 15)}s / lights ${lightK > .12 ? 'on' : 'off'}`;
      }
    }

    const island = new Island();
    const tower = new TokyoTower(island.group);
    const landmarks = [Landmark.fuji(island.group), Landmark.torii(island.group), Landmark.temple(island.group)];
    const leaves = new MapleLeafSystem();
    const cycle = new DayNightCycle(tower, landmarks);
    addClouds();

    function addClouds() {
      const mat = toon(0xffffff);
      for (let i = 0; i < 9; i++) {
        const g = new THREE.Group();
        for (let j = 0; j < 4; j++) {
          const puff = new THREE.Mesh(new THREE.SphereGeometry(.35 + Math.random() * .24, 14, 10), mat);
          puff.position.set(j * .38, Math.random() * .18, Math.random() * .16);
          g.add(puff);
        }
        const a = i / 9 * Math.PI * 2, r = 10 + Math.random() * 6;
        g.position.set(Math.cos(a)*r, 3.8 + Math.random() * 2.2, Math.sin(a)*r);
        g.userData.speed = .04 + Math.random() * .035;
        scene.add(g);
      }
    }

    addEventListener('keydown', e => { if (e.key.toLowerCase() === 'f') cycle.speed = cycle.speed === 1 ? 4 : 1; });
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    let last = performance.now();
    function animate(now) {
      const dt = Math.min((now - last) / 1000, .05);
      last = now;
      const t = now / 1000;
      island.update(t); leaves.update(dt, t); cycle.update(t); controls.update();
      for (const child of scene.children) if (child.userData.speed) child.rotation.y += dt * child.userData.speed;
      statsEl.textContent = `${leaves.leaves.length} pooled maple leaves`;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
