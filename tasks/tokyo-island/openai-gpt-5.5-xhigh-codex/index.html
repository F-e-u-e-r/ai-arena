<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Tokyo Island - GPT-5.5 xhigh</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<canvas id="scene" aria-label="3D floating Tokyo island scene"></canvas>
<section class="hud" aria-live="polite">
  <div>
    <strong>Tokyo Sky Island</strong>
    <span id="phase">Day</span>
  </div>
  <div class="metrics">
    <span id="leafCount">180 leaves</span>
    <span id="fps">-- fps</span>
  </div>
</section>
<button id="speedToggle" class="speed" type="button">Cycle x1</button>
<p class="hint">Drag left or right to orbit. Press <kbd>F</kbd> for fast cycle.</p>
<script src="./main.js"></script>
</body>
</html>
