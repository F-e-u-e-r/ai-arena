<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>非洲大草原生態系統 — Sonnet 5 max</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  canvas { display: block; touch-action: none; }
  #hud {
    position: fixed; z-index: 2; top: 6px; left: 8px; color: #fff; opacity: .88;
    text-shadow: 0 1px 3px rgba(0,0,0,.85); pointer-events: none; font-size: 11px;
    line-height: 1.4; white-space: nowrap;
  }
  #ui {
    position: fixed; z-index: 3; left: 0; right: 0; bottom: 0;
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 4px;
    padding: 5px 6px 6px;
    background: linear-gradient(to top, rgba(0,0,0,.5), rgba(0,0,0,0));
  }
  #ui .sep { width: 1px; height: 18px; background: rgba(255,255,255,.32); margin: 0 3px; }
  button.ctrl {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,.28);
    background: rgba(20,20,25,.55); color: #fff; font-size: 14px; line-height: 1;
    cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
  }
  button.ctrl.active { background: rgba(255,205,80,.95); border-color: #fff; }
  @media (max-height: 220px), (max-width: 360px) {
    #hud { font-size: 9px; }
    button.ctrl { width: 23px; height: 23px; font-size: 11px; border-radius: 5px; }
    #ui { gap: 3px; padding: 3px 4px 4px; }
    #ui .sep { height: 14px; }
  }
</style>
</head>
<body>
<div id="hud"></div>
<div id="ui">
  <button class="ctrl wbtn active" data-weather="sunny" title="晴天 (1)">☀️</button>
  <button class="ctrl wbtn" data-weather="rain" title="下雨 (2)">🌧️</button>
  <button class="ctrl wbtn" data-weather="heavyrain" title="暴雨 (3)">💧</button>
  <button class="ctrl wbtn" data-weather="snow" title="下雪 (4)">❄️</button>
  <button class="ctrl wbtn" data-weather="thunder" title="雷暴 (5)">⛈️</button>
  <button class="ctrl wbtn" data-weather="tornado" title="龍捲風 (6)">🌪️</button>
  <span class="sep"></span>
  <button class="ctrl sbtn active" data-season="dry" title="乾季 (S)">🌵</button>
  <button class="ctrl sbtn" data-season="wet" title="濕季 (S)">🌿</button>
</div>
<script>
'use strict';

/* =========================================================================
 * 工具函式與可調常數
 * ========================================================================= */
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
// 與 dt 無關的平滑趨近（exponential smoothing），frame rate 變動時手感一致。
function approach(current, target, dt, rate) { return lerp(current, target, 1 - Math.exp(-rate * dt)); }

const GROUND_TOP_FRAC = 0.42;   // 地平線：草原從畫面高度的 42% 處開始
const GROUND_BOTTOM_FRAC = 0.90; // 動物車道的下界（用來算景深縮放）
const TORNADO_SPEED = 30;        // 龍捲風追逐速度（刻意比所有動物基準速度慢）
const SEASON_PERIOD = 60;        // 季節自動輪轉週期（秒）

/* =========================================================================
 * Canvas 設定與 RWD
 * ========================================================================= */
const canvas = document.createElement('canvas');
document.body.insertBefore(canvas, document.getElementById('hud'));
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resizeCanvas() {
  const oldW = W, oldH = H;
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  if (oldW && oldH && typeof animals !== 'undefined') {
    // 動物的水平位置以「畫面進度」的概念儲存，resize 時等比例換算，
    // 垂直位置一律用車道分數即時算出、不需要換算。
    const sx = W / oldW;
    for (const a of animals) a.x *= sx;
  }
}

/* =========================================================================
 * SeasonManager：乾季 / 濕季，每 60 秒自動輪轉，也可手動切換
 * ========================================================================= */
class SeasonManager {
  constructor() {
    this.current = 'dry';
    this.timer = 0;
  }
  update(dt) {
    this.timer += dt;
    if (this.timer >= SEASON_PERIOD) {
      this.set(this.current === 'dry' ? 'wet' : 'dry');
    }
  }
  set(season) {
    this.current = season;
    this.timer = 0; // 手動切換也重設倒數，之後的自動輪轉從這一刻重新算 60 秒
    document.querySelectorAll('.sbtn').forEach(b => b.classList.toggle('active', b.dataset.season === season));
  }
  speedMul() { return this.current === 'wet' ? 1.15 : 0.9; }
  timeLeft() { return Math.max(0, SEASON_PERIOD - this.timer); }
}

/* =========================================================================
 * WeatherManager：6 種天氣單選，切換時正確回收舊粒子
 * ========================================================================= */
function particleTypeForWeather(w) {
  if (w === 'rain' || w === 'heavyrain' || w === 'thunder') return 'rain';
  if (w === 'snow') return 'snow';
  if (w === 'tornado') return 'debris';
  return null; // sunny 沒有對應粒子
}

class WeatherManager {
  constructor(particleSystem) {
    this.current = 'sunny';
    this.ps = particleSystem;
    this.spawnAccum = 0;
  }
  set(type) {
    if (type === this.current) return;
    const oldType = particleTypeForWeather(this.current);
    const newType = particleTypeForWeather(type);
    // 只有「粒子種類真的變了」才清空舊粒子；thunder ↔ rain ↔ heavyrain 共用同一種雨滴粒子，
    // 切換時保留現有雨滴，只是有沒有閃電的差別，畫面才不會每次切換都跳一下。
    if (oldType && oldType !== newType) this.ps.clearType(oldType);
    this.current = type;
    this.spawnAccum = 0;
    document.querySelectorAll('.wbtn').forEach(b => b.classList.toggle('active', b.dataset.weather === type));
  }
  spawnRate() {
    const base = { sunny: 0, rain: 55, heavyrain: 150, snow: 42, thunder: 95, tornado: 60 }[this.current];
    // 「雪只在乾季較少出現」：乾季雪天氣的粒子密度明顯調低，視覺上更稀薄。
    if (this.current === 'snow' && seasonManager.current === 'dry') return base * 0.35;
    return base;
  }
  speedMul() {
    return { sunny: 1, rain: 0.9, heavyrain: 0.72, snow: 0.8, thunder: 0.68, tornado: 0.6 }[this.current];
  }
  update(dt, width, groundY) {
    this.spawnAccum += this.spawnRate() * dt;
    while (this.spawnAccum >= 1) {
      this.spawnAccum -= 1;
      this.spawnOne(width, groundY);
    }
  }
  spawnOne(width) {
    const t = this.current;
    if (t === 'sunny') return;
    if (t === 'rain' || t === 'heavyrain' || t === 'thunder') {
      const heavy = t === 'heavyrain';
      this.ps.spawn('rain', p => {
        p.x = Math.random() * width; p.y = -10;
        p.vx = heavy ? -70 - Math.random() * 40 : -22 - Math.random() * 18;
        p.vy = heavy ? 640 + Math.random() * 120 : 420 + Math.random() * 100;
        p.maxLife = 3; p.size = heavy ? 2.6 : 1.6;
      });
    } else if (t === 'snow') {
      this.ps.spawn('snow', p => {
        p.x = Math.random() * width; p.y = -10;
        p.vy = 38 + Math.random() * 28; p.vx = 0;
        p.data = { swayFreq: 1 + Math.random() * 1.5, swayAmp: 18 + Math.random() * 18, seed: Math.random() * 10 };
        p.maxLife = 8; p.size = 2 + Math.random() * 2.2;
      });
    } else if (t === 'tornado') {
      this.ps.spawn('debris', p => {
        p.data = { angle: Math.random() * Math.PI * 2, angularSpeed: 3 + Math.random() * 3, radius: 10 + Math.random() * 32, height: Math.random() * 90 };
        p.maxLife = 2.5; p.size = 2 + Math.random() * 3;
      });
    }
  }
}

/* =========================================================================
 * ParticleSystem：固定大小的物件池，spawn 時重用第一個 inactive slot，
 * 天氣切換時用 clearType() 整批回收，避免無止盡配置新物件。
 * ========================================================================= */
class ParticleSystem {
  constructor(size) {
    this.size = size;
    this.items = Array.from({ length: size }, () => ({
      active: false, type: null, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1, size: 1, data: null
    }));
    this.cursor = 0; // 環狀游標，避免每次 spawn 都從頭線性掃描整個池
  }
  spawn(type, init) {
    for (let n = 0; n < this.size; n++) {
      const i = (this.cursor + n) % this.size;
      const p = this.items[i];
      if (!p.active) {
        this.cursor = (i + 1) % this.size;
        p.active = true; p.type = type; p.life = 0; p.data = null;
        init(p);
        return p;
      }
    }
    return null; // 池已滿：維持固定上限，寧可跳過這次 spawn 也不無限增長
  }
  forEachActive(fn) { for (const p of this.items) if (p.active) fn(p); }
  clearType(type) { for (const p of this.items) if (p.active && p.type === type) p.active = false; }
  activeCount() { let n = 0; for (const p of this.items) if (p.active) n++; return n; }
}

function updateParticle(p, dt, groundY, width) {
  p.life += dt;
  if (p.life > p.maxLife) { p.active = false; return; }
  if (p.type === 'rain') {
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.y > groundY) p.active = false;
  } else if (p.type === 'snow') {
    p.x += Math.sin((p.life + p.data.seed) * p.data.swayFreq) * p.data.swayAmp * dt;
    p.y += p.vy * dt;
    if (p.y > groundY) p.active = false;
  } else if (p.type === 'debris') {
    p.data.angle += p.data.angularSpeed * dt;
    p.x = tornado.x + Math.cos(p.data.angle) * p.data.radius;
    p.y = groundY - p.data.height + Math.sin(p.data.angle * 1.4) * 3;
  } else if (p.type === 'spark') {
    p.vy += 420 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.y > groundY + 4) p.active = false;
  }
  if (p.x < -30 || p.x > width + 30) p.active = false;
}

function drawParticle(ctx, p) {
  const alpha = clamp(1 - p.life / p.maxLife, 0, 1);
  if (p.type === 'rain') {
    ctx.strokeStyle = `rgba(190,215,235,${0.35 * alpha + 0.35})`;
    ctx.lineWidth = p.size * 0.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02);
    ctx.stroke();
  } else if (p.type === 'snow') {
    ctx.fillStyle = `rgba(255,255,255,${0.75 * alpha + 0.25})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  } else if (p.type === 'debris') {
    ctx.fillStyle = 'rgba(120,100,70,0.8)';
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  } else if (p.type === 'spark') {
    ctx.fillStyle = `rgba(255,230,140,${alpha})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
}

/* =========================================================================
 * Lightning：雷暴天氣的閃電，內建「安全區」演算法避免打中動物
 * ========================================================================= */
class Lightning {
  constructor() {
    this.timer = 1.5 + Math.random() * 2;
    this.flash = 0;
    this.bolt = null;
    this.boltTimer = 0;
  }
  update(dt, animalList, groundY, width) {
    this.flash = Math.max(0, this.flash - dt * 2.6);
    if (this.bolt) {
      this.boltTimer -= dt;
      if (this.boltTimer <= 0) this.bolt = null; // 閃電只短暫顯示，不是持續畫在畫面上
    }
    if (weatherManager.current !== 'thunder') return;
    this.timer -= dt;
    if (this.timer <= 0) {
      this.strike(animalList, width, groundY);
      this.timer = 1.8 + Math.random() * 3.2;
    }
  }
  // 安全區演算法：取樣多個候選 x，挑「離所有動物目前位置的最短距離」最大的那一個。
  // 這保證即使動物散落在畫面各處，也一定能選到當下相對最安全的落雷點；
  // 只要有一個候選達到 SAFE_R 門檻就提早停止取樣，省去多餘運算。
  strike(animalList, width, groundY) {
    const SAFE_R = 55;
    let bestX = width / 2, bestScore = -1;
    for (let n = 0; n < 24; n++) {
      const cand = 20 + Math.random() * (width - 40);
      let minDist = Infinity;
      for (const a of animalList) minDist = Math.min(minDist, Math.abs(cand - a.x));
      if (minDist > bestScore) { bestScore = minDist; bestX = cand; }
      if (bestScore >= SAFE_R) break;
    }
    const points = [{ x: bestX, y: 0 }];
    const segs = 9;
    for (let i = 1; i <= segs; i++) {
      const t = i / segs;
      points.push({ x: bestX + (Math.random() - 0.5) * 30 * (1 - t * 0.4), y: groundY * t });
    }
    this.bolt = points;
    this.boltTimer = 0.15;
    this.flash = 1;
    for (let i = 0; i < 10; i++) {
      particleSystem.spawn('spark', p => {
        p.x = bestX; p.y = groundY;
        p.vx = (Math.random() - 0.5) * 140;
        p.vy = -260 - Math.random() * 140;
        p.maxLife = 0.6; p.size = 2 + Math.random() * 2;
      });
    }
  }
  draw(ctx) {
    if (this.bolt) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,250,200,0.35)';
      ctx.lineWidth = 7;
      ctx.beginPath();
      this.bolt.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.stroke();
      ctx.strokeStyle = '#fffbe0';
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      this.bolt.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.stroke();
      ctx.restore();
    }
    if (this.flash > 0.01) {
      ctx.fillStyle = `rgba(255,255,255,${this.flash * 0.5})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* =========================================================================
 * Tornado：龍捲風天氣，會朝目前最近的動物緩慢追逐
 * ========================================================================= */
class Tornado {
  constructor() {
    this.x = 0;
    this.active = false;
    this.retargetTimer = 0;
    this.target = null;
    this.spin = 0;
    this.groundY = 0;
  }
  update(dt, animalList, width, groundY) {
    this.active = weatherManager.current === 'tornado';
    this.groundY = groundY;
    this.spin += dt * 4;
    if (!this.active) { this.target = null; return; }
    if (this.x === 0) this.x = width * 0.5; // 第一次進入龍捲風天氣時從畫面中央開始
    // 每 0.6 秒才重新鎖定最近的動物一次，而不是每幀都重算，行為更穩定、也省運算。
    this.retargetTimer -= dt;
    if (this.retargetTimer <= 0 || !this.target) {
      let nearest = null, best = Infinity;
      for (const a of animalList) {
        const d = Math.abs(a.x - this.x);
        if (d < best) { best = d; nearest = a; }
      }
      this.target = nearest;
      this.retargetTimer = 0.6;
    }
    const targetX = this.target ? this.target.x : width / 2;
    const dir = Math.sign(targetX - this.x);
    this.x = clamp(this.x + dir * TORNADO_SPEED * dt, 30, width - 30);
  }
  draw(ctx) {
    const groundY = this.groundY;
    const topY = groundY - 220;
    ctx.save();
    const segs = 10;
    for (let i = 0; i < segs; i++) {
      const t0 = i / segs, t1 = (i + 1) / segs;
      const y0 = lerp(groundY, topY, t0), y1 = lerp(groundY, topY, t1);
      const r0 = lerp(14, 70, t0), r1 = lerp(14, 70, t1);
      const sway0 = Math.sin(this.spin + t0 * 6) * 8;
      const sway1 = Math.sin(this.spin + t1 * 6) * 8;
      ctx.fillStyle = `rgba(150,135,110,${0.5 + 0.3 * (1 - t0)})`;
      ctx.beginPath();
      ctx.moveTo(this.x + sway0 - r0, y0);
      ctx.lineTo(this.x + sway0 + r0, y0);
      ctx.lineTo(this.x + sway1 + r1, y1);
      ctx.lineTo(this.x + sway1 - r1, y1);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

/* =========================================================================
 * 背景繪製：天空、雲、視差山丘/相思樹、地面、水坑/積雪、前景草叢
 * ========================================================================= */
function seasonBaseSky() {
  return seasonManager.current === 'dry'
    ? { top: [121, 184, 224], bottom: [242, 226, 176] }
    : { top: [95, 159, 208], bottom: [207, 230, 200] };
}
const WEATHER_SKY_OVERLAY = {
  sunny: null,
  rain: { top: [90, 100, 110], bottom: [150, 160, 165], mix: 0.55 },
  heavyrain: { top: [55, 60, 72], bottom: [100, 108, 115], mix: 0.75 },
  snow: { top: [195, 205, 215], bottom: [230, 235, 240], mix: 0.6 },
  thunder: { top: [35, 35, 48], bottom: [70, 72, 85], mix: 0.8 },
  tornado: { top: [120, 105, 80], bottom: [150, 130, 95], mix: 0.7 }
};
function currentSkyColors() {
  const base = seasonBaseSky();
  const ov = WEATHER_SKY_OVERLAY[weatherManager.current];
  if (!ov) return base;
  return {
    top: base.top.map((c, i) => Math.round(lerp(c, ov.top[i], ov.mix))),
    bottom: base.bottom.map((c, i) => Math.round(lerp(c, ov.bottom[i], ov.mix)))
  };
}
function rgbStr(arr) { return `rgb(${arr[0]},${arr[1]},${arr[2]})`; }

function drawSky() {
  const { top, bottom } = currentSkyColors();
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, rgbStr(top));
  g.addColorStop(1, rgbStr(bottom));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawSunGlow() {
  if (weatherManager.current !== 'sunny') return;
  const gx = W * 0.85, gy = H * 0.16;
  const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, 130);
  grad.addColorStop(0, 'rgba(255,250,210,0.9)');
  grad.addColorStop(1, 'rgba(255,250,210,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(gx, gy, 130, 0, Math.PI * 2); ctx.fill();
}

function updateSkyClouds(dt) {
  for (const c of skyClouds) {
    c.xFrac += (c.speed * dt) / W;
    if (c.xFrac > 1.15) c.xFrac = -0.15;
  }
}
function drawSkyClouds() {
  const stormy = weatherManager.current === 'thunder' || weatherManager.current === 'tornado' || weatherManager.current === 'heavyrain';
  const tint = stormy ? 'rgba(120,120,130,0.75)' : weatherManager.current === 'rain' ? 'rgba(205,205,215,0.8)' : 'rgba(255,255,255,0.88)';
  ctx.fillStyle = tint;
  for (const c of skyClouds) {
    const cx = c.xFrac * W, cy = c.yFrac * H, s = c.scale * 26;
    ctx.beginPath();
    ctx.ellipse(cx, cy, s, s * 0.55, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + s * 0.7, cy + s * 0.1, s * 0.7, s * 0.4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - s * 0.7, cy + s * 0.12, s * 0.65, s * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function hillsColorFor() {
  const dry = seasonManager.current === 'dry';
  const base = dry ? [150, 126, 72] : [70, 108, 58];
  const stormy = ['thunder', 'tornado', 'heavyrain'].includes(weatherManager.current);
  const f = stormy ? 0.7 : 1;
  return `rgba(${Math.round(base[0] * f)},${Math.round(base[1] * f)},${Math.round(base[2] * f)},0.85)`;
}
function acaciaColorFor() {
  const dry = seasonManager.current === 'dry';
  const base = dry ? [110, 90, 50] : [45, 80, 42];
  const stormy = ['thunder', 'tornado', 'heavyrain'].includes(weatherManager.current);
  const f = stormy ? 0.65 : 1;
  return `rgba(${Math.round(base[0] * f)},${Math.round(base[1] * f)},${Math.round(base[2] * f)},0.9)`;
}
function fgGrassColorFor() {
  const dry = seasonManager.current === 'dry';
  const base = dry ? [168, 140, 70] : [58, 120, 48];
  const stormy = ['thunder', 'tornado', 'heavyrain'].includes(weatherManager.current);
  const f = stormy ? 0.68 : 1;
  return `rgb(${Math.round(base[0] * f)},${Math.round(base[1] * f)},${Math.round(base[2] * f)})`;
}
function groundFillColorFor() {
  const dry = seasonManager.current === 'dry';
  let c = dry ? [176, 150, 84] : [90, 138, 66];
  const stormy = ['heavyrain', 'thunder', 'tornado'].includes(weatherManager.current);
  const rainy = weatherManager.current === 'rain';
  const f = stormy ? 0.7 : (rainy ? 0.85 : 1);
  c = c.map(v => Math.round(v * f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

// 視差山丘層：用 modulo 位移做無縫捲動的 tile。
function drawHillsLayer(offset, color, baseY, amp, patternW) {
  ctx.fillStyle = color;
  const shift = -(offset % patternW);
  for (let startX = shift - patternW; startX < W; startX += patternW) {
    ctx.beginPath();
    ctx.moveTo(startX, baseY);
    ctx.quadraticCurveTo(startX + patternW * 0.25, baseY - amp, startX + patternW * 0.5, baseY);
    ctx.quadraticCurveTo(startX + patternW * 0.75, baseY + amp * 0.6, startX + patternW, baseY);
    ctx.lineTo(startX + patternW, H);
    ctx.lineTo(startX, H);
    ctx.closePath();
    ctx.fill();
  }
}
const ACACIA_OFFSETS = [40, 130, 210];
function drawAcaciaLayer(offset, color, baseY, patternW) {
  ctx.fillStyle = color;
  const shift = -(offset % patternW);
  for (let startX = shift - patternW; startX < W; startX += patternW) {
    for (const ox of ACACIA_OFFSETS) {
      const tx = startX + ox;
      ctx.fillRect(tx - 2, baseY - 34, 4, 34);
      ctx.beginPath(); ctx.ellipse(tx, baseY - 40, 26, 11, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
}
function drawGroundFill(topY) {
  ctx.fillStyle = groundFillColorFor();
  ctx.fillRect(0, topY, W, H - topY);
}
function drawWaterHole() {
  const y = H * 0.86;
  const rw = 60, rh = 16;
  ctx.save();
  ctx.fillStyle = '#3f7a8c';
  ctx.beginPath(); ctx.ellipse(waterHole.x, y, rw, rh, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  const rippleScale = 0.5 + 0.15 * Math.sin(sceneClock * 1.4);
  ctx.beginPath(); ctx.ellipse(waterHole.x, y, rw * rippleScale, rh * rippleScale * 0.6, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}
function drawClimbTrees() {
  for (const t of climbTrees) {
    const baseY = H * 0.88;
    ctx.fillStyle = '#5b4326';
    ctx.fillRect(t.x - 4, baseY - 70, 8, 70);
    ctx.fillStyle = '#3f6b34';
    ctx.beginPath(); ctx.ellipse(t.x, baseY - 78, 42, 22, 0, 0, Math.PI * 2); ctx.fill();
  }
}
// 雨天地面積水／雪天積雪：用兩個 0..1 純量平滑趨近，畫成疊在地面上的半透明色帶。
function drawGroundFX(topY) {
  if (wetness > 0.02) {
    ctx.fillStyle = `rgba(120,150,180,${wetness * 0.35})`;
    ctx.fillRect(0, topY, W, H - topY);
    ctx.strokeStyle = `rgba(220,235,245,${wetness * 0.5})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const ly = topY + 12 + i * ((H - topY - 12) / 6);
      ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
    }
  }
  if (snowCover > 0.02) {
    ctx.fillStyle = `rgba(255,255,255,${snowCover * 0.55})`;
    ctx.fillRect(0, topY, W, H - topY);
  }
}
function drawForegroundGrass(offset, color, patternW) {
  ctx.fillStyle = color;
  const shift = -(offset % patternW);
  const baseY = H;
  for (let startX = shift - patternW; startX < W + patternW; startX += patternW) {
    for (let i = 0; i < 6; i++) {
      const tx = startX + i * (patternW / 6) + (i % 2 ? 6 : 0);
      ctx.beginPath();
      ctx.moveTo(tx, baseY);
      ctx.quadraticCurveTo(tx - 4, baseY - 16, tx - 1, baseY - 26);
      ctx.quadraticCurveTo(tx + 3, baseY - 14, tx + 2, baseY);
      ctx.closePath(); ctx.fill();
    }
  }
}

/* =========================================================================
 * Animal 基底類別 + Lion / Elephant / Leopard
 * ========================================================================= */
class Animal {
  constructor(laneFrac, baseSpeed, size) {
    this.laneFrac = laneFrac;
    this.baseSpeed = baseSpeed;
    this.size = size;
    this.x = -Math.random() * 400 - 40;
    this.walkPhase = Math.random() * Math.PI * 2;
    this.idleClock = Math.random() * 10;
    this.state = 'WALK';
    this.stateTimer = 0;
    this.cooldown = 3 + Math.random() * 5;
    this.mood = '';
    this.leader = null;
    this.followOffset = 0;
    this.fleeBoost = 1;
  }
  get y() { return this.laneFrac * H; }
  depthScale() {
    const t = (this.laneFrac - GROUND_TOP_FRAC) / (GROUND_BOTTOM_FRAC - GROUND_TOP_FRAC);
    return lerp(0.72, 1.18, clamp(t, 0, 1));
  }
  currentSpeed() {
    return this.baseSpeed * seasonManager.speedMul() * weatherManager.speedMul() * this.fleeBoost;
  }
  updateFlee(dt) {
    // 龍捲風靠近時暫時提速逃離；用 approach() 平滑變化，速度不會瞬間跳變。
    // 倍率刻意調到連天氣減速最重的大象都能甩開恆速的龍捲風（TORNADO_SPEED=30），
    // 讓「追逐」讀起來是動態的貓捉老鼠，而不是龍捲風黏在最慢的動物身上不放。
    const near = tornado.active && Math.abs(this.x - tornado.x) < 130;
    this.fleeBoost = approach(this.fleeBoost, near ? 2.2 : 1, dt, 4);
  }
  updateState(_dt) { /* 由子類別覆寫：定義 WALK 與其他狀態之間如何轉換 */ }
  updateMovement(dt) {
    const spd = this.currentSpeed();
    if (this.leader) {
      // 跟隨隊形：往「領頭者位置 - 跟隨間距」逼近，速度略快於目標以便跟上隊伍，
      // 但每幀移動量仍夾在 currentSpeed 換算出的上限內，不會瞬移。
      const targetX = this.leader.x - this.followOffset;
      const diff = targetX - this.x;
      const maxStep = spd * 1.3 * dt;
      this.x += clamp(diff, -maxStep, maxStep);
    } else {
      this.x += spd * dt;
    }
    this.walkPhase += dt * (2 + spd / 16);
    if (this.x > W + 90) this.x = -Math.random() * 300 - 60; // 從左側重新出現，無縫循環
  }
  update(dt) {
    this.idleClock += dt;
    this.updateFlee(dt);
    this.updateState(dt);
    if (this.state === 'WALK') this.updateMovement(dt);
  }
  bobOffset() {
    return this.state === 'WALK'
      ? Math.sin(this.walkPhase * 2) * this.size * 0.05
      : Math.sin(this.idleClock * 1.6) * this.size * 0.025;
  }
}

class Lion extends Animal {
  updateState(dt) {
    if (this.state === 'WALK') {
      this.cooldown -= dt;
      if (this.cooldown <= 0) {
        // 乾季更容易群聚休息，濕季更常持續移動。
        const restChance = seasonManager.current === 'dry' ? 0.5 : 0.25;
        if (Math.random() < restChance) {
          this.state = 'REST';
          this.stateTimer = 2.5 + Math.random() * 3.5;
          this.mood = '💤';
        }
        this.cooldown = 6 + Math.random() * 6;
      }
    } else if (this.state === 'REST') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) { this.state = 'WALK'; this.mood = ''; }
    }
  }
  draw(ctx) {
    const s = this.size * this.depthScale();
    const x = this.x, y = this.y + this.bobOffset();
    ctx.save();
    ctx.translate(x, y);

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, s * 0.62, s * 1.0, s * 0.26, 0, 0, Math.PI * 2); ctx.fill();

    const legSwing = this.state === 'WALK' ? Math.sin(this.walkPhase) : 0;
    ctx.strokeStyle = '#7c5c28'; ctx.lineWidth = Math.max(1.5, s * 0.14); ctx.lineCap = 'round';
    [[-0.55, 1], [0.5, -1], [-0.15, -1], [0.2, 1]].forEach(([lx, dir]) => {
      const sw = legSwing * dir * s * 0.18;
      ctx.beginPath();
      ctx.moveTo(lx * s, s * 0.25);
      ctx.lineTo(lx * s + sw, s * 0.62);
      ctx.stroke();
    });

    ctx.fillStyle = '#caa24a';
    ctx.beginPath(); ctx.ellipse(0, 0, s * 0.95, s * 0.52, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#8a5a22';
    ctx.beginPath(); ctx.ellipse(s * 0.74, -s * 0.04, s * 0.40, s * 0.40, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#dcb868';
    ctx.beginPath(); ctx.ellipse(s * 0.92, -s * 0.02, s * 0.28, s * 0.24, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#b5843c';
    ctx.beginPath(); ctx.arc(s * 0.82, -s * 0.30, s * 0.09, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s * 1.02, -s * 0.30, s * 0.09, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = '#7c5c28'; ctx.lineWidth = Math.max(1.2, s * 0.07);
    const tailWag = Math.sin(this.idleClock * 3) * 4;
    ctx.beginPath();
    ctx.moveTo(-s * 0.9, 0);
    ctx.quadraticCurveTo(-s * 1.3, s * 0.25 + tailWag, -s * 1.1, s * 0.5);
    ctx.stroke();

    if (this.mood) {
      ctx.font = `${Math.round(s * 0.5)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(this.mood, s * 0.4, -s * 0.85);
    }
    ctx.restore();
  }
}

class Elephant extends Animal {
  updateState(dt) {
    if (this.state === 'WALK') {
      this.cooldown -= dt;
      const nearWater = Math.abs(this.x - waterHole.x) < 70;
      if (this.cooldown <= 0) {
        if (nearWater && Math.random() < 0.6) {
          this.state = 'DRINK';
          this.stateTimer = 2.8 + Math.random() * 2.2;
          this.mood = '💧';
        }
        this.cooldown = 5 + Math.random() * 5;
      }
    } else if (this.state === 'DRINK') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) { this.state = 'WALK'; this.mood = ''; }
    }
  }
  draw(ctx) {
    const s = this.size * this.depthScale();
    const x = this.x, y = this.y + this.bobOffset();
    ctx.save();
    ctx.translate(x, y);

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, s * 0.58, s * 1.05, s * 0.28, 0, 0, Math.PI * 2); ctx.fill();

    const legSwing = this.state === 'WALK' ? Math.sin(this.walkPhase) : 0;
    ctx.strokeStyle = '#787d82'; ctx.lineWidth = Math.max(2, s * 0.22); ctx.lineCap = 'round';
    [[-0.55, 1], [0.5, -1], [-0.2, -1], [0.25, 1]].forEach(([lx, dir]) => {
      const sw = legSwing * dir * s * 0.1;
      ctx.beginPath();
      ctx.moveTo(lx * s, s * 0.2);
      ctx.lineTo(lx * s + sw, s * 0.62);
      ctx.stroke();
    });

    ctx.fillStyle = '#9aa0a6';
    ctx.beginPath(); ctx.ellipse(0, 0, s * 1.05, s * 0.58, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#8b9096';
    ctx.beginPath(); ctx.ellipse(s * 0.62, -s * 0.35, s * 0.36, s * 0.34, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s * 0.98, -s * 0.1, s * 0.30, s * 0.28, 0, 0, Math.PI * 2); ctx.fill();

    const drink = this.state === 'DRINK';
    const trunkLift = drink ? Math.sin(this.idleClock * 3) * 6 + 10 : Math.sin(this.walkPhase * 0.5) * 3;
    ctx.strokeStyle = '#8b9096'; ctx.lineWidth = Math.max(2, s * 0.14); ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s * 1.12, s * 0.02);
    ctx.quadraticCurveTo(s * 1.28, s * 0.35, s * 1.12 + trunkLift * 0.15, s * 0.5 - trunkLift * (drink ? 1 : 0.2));
    ctx.stroke();

    ctx.strokeStyle = '#f2f2ea'; ctx.lineWidth = Math.max(1.2, s * 0.06);
    ctx.beginPath(); ctx.moveTo(s * 1.05, s * 0.12); ctx.quadraticCurveTo(s * 1.18, s * 0.2, s * 1.1, s * 0.3); ctx.stroke();

    ctx.strokeStyle = '#787d82'; ctx.lineWidth = Math.max(1, s * 0.05);
    ctx.beginPath(); ctx.moveTo(-s * 1.0, 0); ctx.lineTo(-s * 1.2, s * 0.3 + Math.sin(this.idleClock * 2) * 3); ctx.stroke();

    if (this.mood) {
      ctx.font = `${Math.round(s * 0.45)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(this.mood, s * 0.6, -s * 0.95);
    }
    ctx.restore();
  }
}

class Leopard extends Animal {
  updateState(dt) {
    if (this.state === 'WALK') {
      this.cooldown -= dt;
      const nearTree = climbTrees.some(t => Math.abs(this.x - t.x) < 50);
      if (this.cooldown <= 0) {
        if (nearTree && Math.random() < 0.5) {
          this.state = 'CLIMB';
          this.stateTimer = 2.2 + Math.random() * 1.8;
          this.climbDuration = this.stateTimer;
        }
        this.cooldown = 4 + Math.random() * 5;
      }
    } else if (this.state === 'CLIMB') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) this.state = 'WALK';
    }
  }
  climbLift() {
    if (this.state !== 'CLIMB' || !this.climbDuration) return 0;
    const p = 1 - clamp(this.stateTimer / this.climbDuration, 0, 1);
    return Math.sin(p * Math.PI) * this.size * 1.6; // 爬上去再下來的單一拱形軌跡
  }
  draw(ctx) {
    const s = this.size * this.depthScale();
    const lift = this.climbLift();
    const x = this.x, y = this.y + this.bobOffset() - lift;
    ctx.save();
    ctx.translate(x, y);

    if (lift < 1) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse(0, s * 0.55 + lift, s * 0.85, s * 0.22, 0, 0, Math.PI * 2); ctx.fill();
    }

    const legSwing = this.state === 'WALK' ? Math.sin(this.walkPhase * 1.3) : 0;
    ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = Math.max(1.2, s * 0.12); ctx.lineCap = 'round';
    [[-0.5, 1], [0.45, -1], [-0.15, -1], [0.18, 1]].forEach(([lx, dir]) => {
      const sw = legSwing * dir * s * 0.2;
      ctx.beginPath();
      ctx.moveTo(lx * s, s * 0.2);
      ctx.lineTo(lx * s + sw, s * 0.52);
      ctx.stroke();
    });

    ctx.fillStyle = '#d9b56a';
    ctx.beginPath(); ctx.ellipse(0, 0, s * 0.9, s * 0.42, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#dcbf7c';
    ctx.beginPath(); ctx.ellipse(s * 0.82, -s * 0.08, s * 0.26, s * 0.22, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#8a6a3a';
    ctx.beginPath(); ctx.moveTo(s * 0.72, -s * 0.26); ctx.lineTo(s * 0.8, -s * 0.42); ctx.lineTo(s * 0.88, -s * 0.24); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s * 0.92, -s * 0.24); ctx.lineTo(s * 1.0, -s * 0.4); ctx.lineTo(s * 1.06, -s * 0.2); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#5a4020';
    const spots = [[-0.5, -0.1], [-0.25, 0.15], [0.0, -0.15], [0.25, 0.1], [-0.6, 0.12], [0.45, -0.05]];
    for (const [sx, sy] of spots) {
      ctx.beginPath(); ctx.arc(sx * s, sy * s, s * 0.08, 0, Math.PI * 2); ctx.fill();
    }

    ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = Math.max(1, s * 0.06);
    ctx.beginPath();
    ctx.moveTo(-s * 0.85, 0);
    ctx.quadraticCurveTo(-s * 1.3, -s * 0.1 + Math.sin(this.idleClock * 2) * 5, -s * 1.35, s * 0.2);
    ctx.stroke();

    ctx.restore();
  }
}

/* =========================================================================
 * 場景組裝
 * ========================================================================= */
const particleSystem = new ParticleSystem(450);
const seasonManager = new SeasonManager();
const weatherManager = new WeatherManager(particleSystem);
const tornado = new Tornado();
const lightning = new Lightning();

const waterHole = { xFrac: 0.60, x: 0 };
const climbTrees = [{ xFrac: 0.16, x: 0 }, { xFrac: 0.82, x: 0 }];

const lionA = new Lion(0.58, 50, 27);
const lionB = new Lion(0.63, 50, 25);
lionB.leader = lionA; lionB.followOffset = 55;
const lionC = new Lion(0.50, 48, 24);

const elephantA = new Elephant(0.83, 34, 40);
const elephantB = new Elephant(0.88, 33, 37);
elephantB.leader = elephantA; elephantB.followOffset = 78;

const leopardA = new Leopard(0.70, 92, 21);
const leopardB = new Leopard(0.45, 98, 19);

const animals = [lionA, lionB, lionC, elephantA, elephantB, leopardA, leopardB];

const skyClouds = Array.from({ length: 5 }, () => ({
  xFrac: Math.random(), yFrac: 0.08 + Math.random() * 0.22,
  scale: 0.7 + Math.random() * 0.9, speed: 4 + Math.random() * 6
}));

let wetness = 0, snowCover = 0;
let bgOffset1 = 0, bgOffset2 = 0, bgOffset3 = 0;
let sceneClock = 0;

/* =========================================================================
 * UI 綁定：天氣／季節按鈕 + 鍵盤快捷鍵
 * ========================================================================= */
document.querySelectorAll('.wbtn').forEach(btn => {
  btn.addEventListener('click', () => weatherManager.set(btn.dataset.weather));
});
document.querySelectorAll('.sbtn').forEach(btn => {
  btn.addEventListener('click', () => seasonManager.set(btn.dataset.season));
});
window.addEventListener('keydown', (e) => {
  const map = { '1': 'sunny', '2': 'rain', '3': 'heavyrain', '4': 'snow', '5': 'thunder', '6': 'tornado' };
  if (map[e.key]) weatherManager.set(map[e.key]);
  else if (e.key === 's' || e.key === 'S') seasonManager.set(seasonManager.current === 'dry' ? 'wet' : 'dry');
});

/* =========================================================================
 * HUD
 * ========================================================================= */
const hud = document.getElementById('hud');
const WEATHER_LABEL = { sunny: '晴天', rain: '下雨', heavyrain: '暴雨', snow: '下雪', thunder: '雷暴', tornado: '龍捲風' };
let fps = 60, frameCount = 0, fpsAccum = 0;
function updateHud() {
  const seasonLabel = seasonManager.current === 'dry' ? '乾季' : '濕季';
  hud.textContent = `FPS ${fps} · 粒子 ${particleSystem.activeCount()} · ${seasonLabel}(${Math.round(seasonManager.timeLeft())}s) · ${WEATHER_LABEL[weatherManager.current]}`;
}

/* =========================================================================
 * 主更新 / 繪製迴圈
 * ========================================================================= */
function update(dt) {
  sceneClock += dt;
  seasonManager.update(dt);
  const groundY = H * 0.95;
  weatherManager.update(dt, W, groundY);
  bgOffset1 += 6 * dt; bgOffset2 += 14 * dt; bgOffset3 += 32 * dt;
  updateSkyClouds(dt);
  const rainy = weatherManager.current === 'rain' || weatherManager.current === 'heavyrain' || weatherManager.current === 'thunder';
  wetness = approach(wetness, rainy ? 1 : 0, dt, 0.4);
  snowCover = approach(snowCover, weatherManager.current === 'snow' ? 1 : 0, dt, 0.25);
  waterHole.x = waterHole.xFrac * W;
  for (const t of climbTrees) t.x = t.xFrac * W;
  tornado.update(dt, animals, W, groundY);
  lightning.update(dt, animals, groundY, W);
  for (const a of animals) a.update(dt);
  particleSystem.forEachActive(p => updateParticle(p, dt, groundY, W));
}

function render() {
  const groundTopY = H * GROUND_TOP_FRAC;
  drawSky();
  drawSunGlow();
  drawSkyClouds();
  drawHillsLayer(bgOffset1, hillsColorFor(), groundTopY + 16, 20, 260);
  drawAcaciaLayer(bgOffset2, acaciaColorFor(), groundTopY + 26, 220);
  drawGroundFill(groundTopY);
  drawWaterHole();
  drawClimbTrees();
  drawGroundFX(groundTopY);

  animals.slice().sort((a, b) => a.laneFrac - b.laneFrac).forEach(a => a.draw(ctx));

  particleSystem.forEachActive(p => drawParticle(ctx, p));

  drawForegroundGrass(bgOffset3, fgGrassColorFor(), 90);

  if (tornado.active) tornado.draw(ctx);
  lightning.draw(ctx);
}

let lastTime = 0;
function loop(now) {
  requestAnimationFrame(loop);
  if (!lastTime) lastTime = now;
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  dt = Math.min(dt, 0.05); // 分頁切走再切回時，限制單幀最大 dt，避免動物瞬移或天氣狀態跳格
  update(dt);
  render();
  frameCount++; fpsAccum += dt;
  if (fpsAccum >= 0.5) { fps = Math.round(frameCount / fpsAccum); frameCount = 0; fpsAccum = 0; }
  updateHud();
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
new ResizeObserver(() => resizeCanvas()).observe(document.documentElement);
requestAnimationFrame(loop);
</script>
</body>
</html>
