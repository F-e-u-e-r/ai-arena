name: AI Arena CI / Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run on every PR and push: verify manifest sync and scan for secrets.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Generate task manifest
        run: node scripts/build-manifest.mjs

      - name: Verify generated manifest is committed
        run: |
          if ! git diff --exit-code -- tasks.json; then
            echo "::error file=tasks.json::tasks.json is out of sync. Run node scripts/build-manifest.mjs and commit the regenerated file."
            exit 1
          fi

      - name: Scan submissions for secrets
        run: node scripts/scan-secrets.mjs

  # Deploy only on pushes to main or manual runs. PRs, including forks, do not deploy.
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Generate task manifest
        run: node scripts/build-manifest.mjs

      - name: Build static site
        run: |
          mkdir -p _site
          cp -R index.html assets tasks tasks.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
          timeout: 600000
